<!DOCTYPE html>
<html>
<head>

<title>TXT to Word Batch Converter</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

button{
padding:10px 20px;
margin:10px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e7e34;
}

.fileBox{
background:white;
padding:15px;
margin:10px auto;
width:60%;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<h1>📚 TXT → Word Batch Converter</h1>

<input type="file" id="files" multiple accept=".txt">

<br><br>

<button onclick="convertFiles()">Convert to Word</button>
<button onclick="downloadAll()">Download All</button>

<div id="fileArea"></div>

<script>

let downloadLinks = [];

function convertFiles(){

downloadLinks = [];

let files=document.getElementById("files").files;
let area=document.getElementById("fileArea");

area.innerHTML="";

for(let i=0;i<files.length;i++){

let file=files[i];
let reader=new FileReader();

reader.onload=function(e){

let text=e.target.result;

let htmlContent = `
<html>
<body>
<pre style="font-family:Calibri;font-size:16px;white-space:pre-wrap;">
${text}
</pre>
</body>
</html>
`;

let blob=new Blob(['\ufeff', htmlContent],{
type:'application/msword'
});

let url=URL.createObjectURL(blob);

let name=file.name.replace(".txt",".doc");

downloadLinks.push({url:url,name:name});

area.innerHTML+=`
<div class="fileBox">

<b>${name}</b>

<br><br>

<a href="${url}" download="${name}">
<button>Download</button>
</a>

</div>
`;

};

reader.readAsText(file);

}

}

function downloadAll(){

for(let i=0;i<downloadLinks.length;i++){

let a=document.createElement("a");
a.href=downloadLinks[i].url;
a.download=downloadLinks[i].name;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);

}

}

</script>

</body>
</html>
