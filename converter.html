<!DOCTYPE html>
<html>
<head>
<title>TXT / ZIP to PDF Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#progressContainer{
width:80%;
height:25px;
background:#ddd;
margin:auto;
border-radius:10px;
overflow:hidden;
}

#progressBar{
height:100%;
width:0%;
background:#28a745;
}
</style>
</head>

<body>

<h2>TXT / ZIP → PDF Book Converter</h2>

<input type="file" id="files" multiple>

<br><br>

<button onclick="startConvert()">Start Convert</button>
<button onclick="downloadAll()">Download All</button>

<br><br>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<br>

<p id="status">Waiting...</p>

<script>

let books=[]
let pdfFiles=[]

function sleep(ms){
return new Promise(resolve=>setTimeout(resolve,ms))
}

async function startConvert(){

books=[]
pdfFiles=[]

const { jsPDF } = window.jspdf

let files=document.getElementById("files").files

if(files.length==0){
alert("Select files first")
return
}

document.getElementById("status").innerText="Reading files..."

for(let file of files){

if(file.name.endsWith(".txt")){

let text=await file.text()
books.push({name:file.name,text:text})

}

else if(file.name.endsWith(".zip")){

let zip=await JSZip.loadAsync(file)

for(let name in zip.files){

if(name.endsWith(".txt")){

let text=await zip.files[name].async("string")
books.push({name:name,text:text})

}

}

}

}

let total=books.length
document.getElementById("status").innerText="Books found: "+total

for(let i=0;i<total;i++){

let book=books[i]

let doc=new jsPDF()

let lines=doc.splitTextToSize(book.text,180)

let y=10

for(let line of lines){

if(y>280){
doc.addPage()
y=10
}

doc.text(line,10,y)
y+=7

}

let blob=doc.output("blob")

pdfFiles.push({
name:book.name.replace(".txt",".pdf"),
blob:blob
})

let percent=Math.floor(((i+1)/total)*100)

document.getElementById("progressBar").style.width=percent+"%"

document.getElementById("status").innerText =
"Converted "+(i+1)+" / "+total+" books ("+percent+"%)"

await sleep(50)

}

document.getElementById("status").innerText="Conversion finished"

}

async function downloadAll(){

if(pdfFiles.length==0){
alert("Convert books first")
return
}

document.getElementById("status").innerText="Downloading..."

for(let i=0;i<pdfFiles.length;i++){

let pdf=pdfFiles[i]

let url=URL.createObjectURL(pdf.blob)

let a=document.createElement("a")

a.href=url
a.download=pdf.name

document.body.appendChild(a)

a.click()

document.body.removeChild(a)

await sleep(3000)

}

document.getElementById("status").innerText="All downloads finished"

}

</script>

</body>
</html>
