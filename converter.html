<!DOCTYPE html>
<html>

<head>

<title>ZIP TXT → PDF Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e7e34;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

.fileBox{
background:white;
padding:15px;
margin:10px auto;
width:60%;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<h1>📚 ZIP → TXT → PDF Converter</h1>

<p>Select ZIP files containing TXT books</p>

<input type="file" id="zipFiles" multiple accept=".zip">

<br><br>

<button onclick="processZips()">Convert Books</button>

<button onclick="downloadAll()" id="downloadBtn" disabled>
Download All PDFs
</button>

<div id="fileArea"></div>

<script>

let pdfFiles=[]

async function processZips(){

pdfFiles=[]

document.getElementById("fileArea").innerHTML=""
document.getElementById("downloadBtn").disabled=true

let files=document.getElementById("zipFiles").files

for(let file of files){

let zip=await JSZip.loadAsync(file)

for(let filename in zip.files){

if(filename.endsWith(".txt")){

let txt=await zip.files[filename].async("string")

const { jsPDF } = window.jspdf

let doc=new jsPDF()

let lines=doc.splitTextToSize(txt,180)

let y=10

for(let i=0;i<lines.length;i++){

if(y>280){
doc.addPage()
y=10
}

doc.text(lines[i],10,y)
y+=7

}

let pdfBlob=doc.output("blob")

let url=URL.createObjectURL(pdfBlob)

let newName=filename.replace(".txt",".pdf")

pdfFiles.push({url:url,name:newName})

document.getElementById("fileArea").innerHTML+=`

<div class="fileBox">

<b>${newName}</b>

<br><br>

<a href="${url}" download="${newName}">
<button>Download</button>
</a>

</div>

`

}

}

}

document.getElementById("downloadBtn").disabled=false

alert("All books converted successfully!")

}

async function downloadAll(){

for(let i=0;i<pdfFiles.length;i++){

let a=document.createElement("a")

a.href=pdfFiles[i].url
a.download=pdfFiles[i].name

document.body.appendChild(a)
a.click()
document.body.removeChild(a)

await new Promise(r=>setTimeout(r,1000))

}

}

</script>

</body>

</html>
