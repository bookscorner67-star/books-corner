<!DOCTYPE html>
<html>
<head>

<title>TXT Multi Downloader</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

button{
padding:10px 20px;
margin:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.fileBox{
background:white;
padding:15px;
margin:10px auto;
width:60%;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<h1>📚 TXT Multi Downloader</h1>

<p>Select many TXT files and download them normally</p>

<input type="file" id="files" multiple accept=".txt">

<br><br>

<button onclick="showFiles()">Load Files</button>

<div id="fileArea"></div>

<script>

function showFiles(){

let files=document.getElementById("files").files;
let area=document.getElementById("fileArea");

area.innerHTML="";

for(let i=0;i<files.length;i++){

let file=files[i];

let url=URL.createObjectURL(file);

area.innerHTML+=`
<div class="fileBox">

<b>${file.name}</b>

<br><br>

<a href="${url}" download="${file.name}">
<button>Download</button>
</a>

</div>
`;

}

}

</script>

</body>
</html>
