<!DOCTYPE html>
<html>
<head>

<title>Super Book Tool</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

.fileBox{
background:white;
padding:15px;
margin:10px auto;
width:60%;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<h1>📚 Super Book Converter</h1>

<p>Upload TXT books and convert to Word or PDF</p>

<input type="file" id="files" multiple accept=".txt">

<br><br>

<button onclick="convertFiles()">Convert Files</button>

<button onclick="downloadAllWord()" id="wordAll" disabled>
Download All Word
</button>

<button onclick="downloadAllPDF()" id="pdfAll" disabled>
Download All PDF
</button>

<div id="fileArea"></div>

<script>

let wordLinks=[]
let pdfLinks=[]
let converted=0
let total=0

function convertFiles(){

wordLinks=[]
pdfLinks=[]
converted=0

let files=document.getElementById("files").files
total=files.length

let area=document.getElementById("fileArea")
area.innerHTML=""

for(let file of files){

let reader=new FileReader()

reader.onload=function(e){

let text=e.target.result

// WORD FILE
let wordHTML=`
<html>
<body>
<pre style="font-family:Calibri;font-size:16px;white-space:pre-wrap;">
${text}
</pre>
</body>
</html>
`

let wordBlob=new Blob(['\ufeff',wordHTML],{type:'application/msword'})
let wordURL=URL.createObjectURL(wordBlob)
let wordName=file.name.replace(".txt",".doc")

wordLinks.push({url:wordURL,name:wordName})


// PDF FILE (simple)
let pdfHTML=`
<html>
<body style="font-family:Arial;white-space:pre-wrap;">
${text}
</body>
</html>
`

let pdfBlob=new Blob([pdfHTML],{type:'application/pdf'})
let pdfURL=URL.createObjectURL(pdfBlob)
let pdfName=file.name.replace(".txt",".pdf")

pdfLinks.push({url:pdfURL,name:pdfName})

area.innerHTML+=`
<div class="fileBox">

<b>${file.name}</b>

<br><br>

<a href="${wordURL}" download="${wordName}">
<button>Download Word</button>
</a>

<a href="${pdfURL}" download="${pdfName}">
<button>Download PDF</button>
</a>

</div>
`

converted++

if(converted===total){

document.getElementById("wordAll").disabled=false
document.getElementById("pdfAll").disabled=false

alert("All books converted successfully!")

}

}

reader.readAsText(file)

}

}

function downloadAllWord(){

for(let f of wordLinks){

let a=document.createElement("a")
a.href=f.url
a.download=f.name
document.body.appendChild(a)
a.click()
document.body.removeChild(a)

}

}

function downloadAllPDF(){

for(let f of pdfLinks){

let a=document.createElement("a")
a.href=f.url
a.download=f.name
document.body.appendChild(a)
a.click()
document.body.removeChild(a)

}

}

</script>

</body>
</html>
