<!DOCTYPE html>
<html>

<head>
<title>BooksCorner</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

header{
background:#222;
color:white;
padding:20px;
font-size:30px;
}

.book{
background:white;
margin:20px auto;
padding:20px;
width:60%;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
padding:10px 15px;
margin:5px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

footer{
margin-top:40px;
background:#222;
color:white;
padding:20px;
}

</style>

</head>

<body>

<header>
📚 BooksCorner Library
</header>


<h2>Categories</h2>

<button onclick="filterBooks('AI')">AI</button>
<button onclick="filterBooks('Science')">Science</button>
<button onclick="filterBooks('Math')">Math</button>
<button onclick="filterBooks('Social')">Social</button>
<button onclick="filterBooks('Story Books')">Story Books</button>
<button onclick="filterBooks('Programming')">Programming</button>
<button onclick="filterBooks('Electronics')">Electronics</button>
<button onclick="filterBooks('All')">All</button>


<h2>Available Books</h2>

<div id="library"></div>


<footer>
If help needed contact:<br>
<b>bookscorner67@gmail.com</b>
</footer>


<script>

let allBooks = [];


fetch("books.json")
.then(res => res.json())
.then(data => {

allBooks = data;
displayBooks(data);

});


function displayBooks(books){

let area = document.getElementById("library");

area.innerHTML = "";

books.forEach(book => {

area.innerHTML += `
<div class="book">

<h3>${book.title}</h3>

<p><b>Category:</b> ${book.category}</p>

<a href="${book.file}" target="_blank">
<button>Read Online</button>
</a>

<a href="${book.file}" download>
<button>Download</button>
</a>

</div>
`;

});

}



function filterBooks(category){

if(category === "All"){
displayBooks(allBooks);
return;
}

let filtered = allBooks.filter(book => book.category === category);

displayBooks(filtered);

}

</script>


</body>
</html>
