<!DOCTYPE html>
<html>
<head>
<title>BooksCorner</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

header{
background:#222;
color:white;
padding:20px;
font-size:30px;
}

.book{
background:white;
margin:20px auto;
padding:20px;
width:60%;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
padding:10px 15px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

footer{
margin-top:40px;
background:#222;
color:white;
padding:20px;
}
</style>

</head>

<body>

<header>
📚 BooksCorner Library
</header>

<h2>Available Books</h2>

<div id="library"></div>

<footer>
If help needed contact:<br>
<b>bookscorner67@gmail.com</b>
</footer>

<script>

fetch("books.json")
.then(res => res.json())
.then(data => {

let area = document.getElementById("library");

data.forEach(book => {

area.innerHTML += `
<div class="book">

<h3>${book.title}</h3>

<a href="${book.file}" target="_blank">
<button>Read Online</button>
</a>

<a href="${book.file}" download>
<button>Download</button>
</a>

</div>
`;

});

});

</script>

</body>
</html>
