<!DOCTYPE html>
<html>
<head>
  <title>BooksCorner Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      font-family:Arial, sans-serif;
      background:#f2f2f2;
      text-align:center;
      margin:0;
      padding:0;
    }
    header{
      background:#222;
      color:white;
      padding:20px;
      font-size:30px;
    }
    .admin-box{
      background:white;
      width:80%;
      max-width:600px;
      margin:30px auto;
      padding:25px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,0.15);
    }
    input, textarea{
      width:90%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:6px;
      font-size:16px;
    }
    button{
      padding:12px 18px;
      margin-top:10px;
      background:#007bff;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-size:16px;
    }
    button:hover{
      background:#0056b3;
    }
    #previewLink, #result{
      margin-top:20px;
      background:#eee;
      padding:15px;
      border-radius:8px;
      text-align:left;
      white-space:pre-wrap;
      word-break:break-word;
    }
  </style>
</head>
<body>

<header>📚 BooksCorner Admin Panel</header>

<div class="admin-box">
  <h2>Convert Google Drive Link to Preview Link</h2>
  <input id="driveLink" placeholder="Paste full Google Drive link here">
  <button onclick="makePreview()">Convert to Preview</button>
  <div id="previewLink"></div>

  <hr style="margin:25px 0;">

  <h2>Add New Book</h2>
  <input id="title" placeholder="Book Title">
  <input id="author" placeholder="Author">
  <input id="category" placeholder="Category">
  <input id="link" placeholder="Preview link will come here">
  <textarea id="desc" placeholder="Description"></textarea>
  <button onclick="addBook()">Generate Book Code</button>

  <div id="result"></div>
</div>

<script>
function makePreview(){
  let fullLink = document.getElementById("driveLink").value.trim();

  let match = fullLink.match(/\/d\/([a-zA-Z0-9_-]+)/);

  if(match){
    let fileId = match[1];
    let preview = "https://drive.google.com/file/d/" + fileId + "/preview";
    document.getElementById("previewLink").innerText = preview;
    document.getElementById("link").value = preview;
  } else {
    document.getElementById("previewLink").innerText = "Invalid Google Drive link";
  }
}

function addBook(){
  let title = document.getElementById("title").value;
  let author = document.getElementById("author").value;
  let category = document.getElementById("category").value;
  let link = document.getElementById("link").value;
  let desc = document.getElementById("desc").value;

  let code = `{
  "title": "${title}",
  "author": "${author}",
  "category": "${category}",
  "file": "${link}",
  "description": "${desc}"
}`;

  document.getElementById("result").innerText = code;
}
</script>

</body>
</html>
