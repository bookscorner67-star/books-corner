<!DOCTYPE html>
<html>
<head>
<title>BooksCorner Admin Panel</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

textarea{
width:90%;
height:300px;
margin-top:20px;
}
</style>
</head>

<body>

<h1>BooksCorner Admin Panel</h1>

<input type="file" id="files" multiple accept=".pdf">

<br><br>

<button onclick="generateJSON()">Generate JSON</button>

<br>

<textarea id="output"></textarea>

<script>

function detectCategory(name){

name=name.toLowerCase()

if(name.includes("ai") || name.includes("artificial"))
return "AI"

if(name.includes("science"))
return "Science"

if(name.includes("social"))
return "Social"

if(name.includes("story") || name.includes("adventure"))
return "Story Books"

if(name.includes("programming") || name.includes("python") || name.includes("code"))
return "Programming"

if(name.includes("electronics") || name.includes("circuit"))
return "Electronics"

return "Science"
}

function generateJSON(){

let files=document.getElementById("files").files
let books=[]

for(let i=0;i<files.length;i++){

let title=files[i].name.replace(".pdf","")

let category=detectCategory(title)

books.push({
title:title,
author:"Unknown",
category:category,
file:"books/"+files[i].name
})

}

document.getElementById("output").value =
JSON.stringify(books,null,2)

}

</script>

</body>
</html>
