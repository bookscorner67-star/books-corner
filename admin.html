<!DOCTYPE html>
<html>
<head>

<title>BooksCorner Admin Panel</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

textarea{
width:80%;
height:300px;
margin-top:20px;
font-family:monospace;
}

</style>

</head>

<body>

<h1>📚 BooksCorner Admin Panel</h1>

<p>Select many book files to generate JSON code</p>

<input type="file" id="files" multiple>

<br><br>

<button onclick="generateJSON()">Generate JSON</button>

<br>

<textarea id="output" placeholder="Generated JSON will appear here"></textarea>

<script>

function generateJSON(){

let files=document.getElementById("files").files

let books=[]

for(let file of files){

let name=file.name.replace(/\.[^/.]+$/, "")

books.push({
title:name,
author:"Unknown",
category:"General",
file:"books/"+file.name
})

}

document.getElementById("output").value=
JSON.stringify(books,null,2)

}

</script>

</body>
</html>
