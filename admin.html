<!DOCTYPE html>
<html>

<head>
<title>BooksCorner Admin Panel</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
margin:0;
}

header{
background:#222;
color:white;
padding:20px;
font-size:30px;
}

input, select{
padding:10px;
width:300px;
margin:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
margin:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.result{
background:white;
padding:20px;
margin:20px auto;
width:60%;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

pre{
text-align:left;
background:#eee;
padding:10px;
overflow:auto;
}

</style>

</head>

<body>

<header>
📚 BooksCorner Admin Panel
</header>

<h2>Add New Book</h2>

<input type="text" id="title" placeholder="Book Name"><br>

<input type="text" id="author" placeholder="Author Name"><br>

<select id="category">
<option>AI</option>
<option>Science</option>
<option>Math</option>
<option>Social</option>
<option>Story Books</option>
<option>Programming</option>
<option>Electronics</option>
</select><br>

<button onclick="generate()">Generate Code</button>

<div class="result" id="result"></div>

<script>

function generate(){

let title = document.getElementById("title").value;
let author = document.getElementById("author").value;
let category = document.getElementById("category").value;

let filename = title.toLowerCase().replace(/ /g,"-") + ".pdf";

let link = "books/" + filename;

let code =
`{
"title": "${title}",
"author": "${author}",
"category": "${category}",
"file": "${link}"
},`;

document.getElementById("result").innerHTML =
"<h3>Copy this code and paste into books.json</h3><pre>"+code+"</pre>";

}

</script>

</body>
</html>
