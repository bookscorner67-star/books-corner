padding:20px;

.book{

.book a{

text-decoration:none;

.book a:hover{
text-decoration:underline;
}

</style>

let currentCategory="All"

fetch("books.json")
.then(res=>res.json())
.then(data=>{
allBooks=data
displayBooks(data)
})

function displayBooks(books){

let container=document.getElementById("books")
container.innerHTML=""

books.forEach(book=>{

let div=document.createElement("div")
div.className="book"

div.innerHTML=`
<h3>${book.title}</h3>
<p>${book.author}</p>
<p>${book.category}</p>
<a href="${book.file}" target="_blank">Open Book</a>
`

container.appendChild(div)

})

}

function filterBooks(category){

currentCategory=category
applyFilters()

}

document.getElementById("search").addEventListener("input",applyFilters)

function applyFilters(){

let search=document.getElementById("search").value.toLowerCase()

let filtered=allBooks.filter(book=>{

let matchCategory=currentCategory==="All" || book.category===currentCategory

let matchSearch=book.title.toLowerCase().includes(search)

return matchCategory && matchSearch

})

displayBooks(filtered)

}
