<!DOCTYPE html>
<html>
<head>
<title>Books Corner</title>

<style>
body{font-family:Arial;margin:0;background:#eef2f7;}
header{background:#1f3a5f;color:white;text-align:center;padding:25px;}
.container{padding:30px;}
.book{background:white;padding:20px;margin:15px 0;border-radius:10px;}
button{background:#2e86de;color:white;border:none;padding:10px 15px;border-radius:6px;margin:5px;}
#reader{display:none;background:white;padding:20px;margin-top:20px;height:500px;}
#reader iframe{width:100%;height:100%;border:none;}
#adminPanel{display:none;background:white;padding:20px;margin-top:30px;border-radius:10px;}
footer{background:#1f3a5f;color:white;text-align:center;padding:15px;margin-top:40px;}
</style>
</head>

<body>

<header>
<h1>📚 Books Corner</h1>
<p>Online Learning Library</p>
</header>

<div class="container">

<div id="bookList"></div>

<div id="reader">
<h3>📖 Online Reader</h3>
<iframe id="bookFrame"></iframe>
</div>

<h3>Admin Login</h3>

<input type="password" id="password" placeholder="Admin password">
<button onclick="login()">Login</button>

<div id="adminPanel">

<h3>Add Book</h3>

<input type="text" id="title" placeholder="Book title">

<br>

<input type="file" id="file">

<br>

<button onclick="addBook()">Add Book</button>

</div>

</div>

<footer>
If help needed contact: bookscorner67@gmail.com
</footer>

<script>

let books = JSON.parse(localStorage.getItem("books")) || [];

function saveBooks(){
localStorage.setItem("books", JSON.stringify(books));
}

function displayBooks(){

let list=document.getElementById("bookList");
list.innerHTML="";

books.forEach((book,index)=>{

let div=document.createElement("div");
div.className="book";

div.innerHTML=
"<h3>"+book.title+"</h3>"+
"<button onclick='readBook("+index+")'>📖 Read Online</button>"+
"<button onclick='downloadMsg()'>⬇ Download</button>";

list.appendChild(div);

});

}

function addBook(){

let title=document.getElementById("title").value;
let file=document.getElementById("file").files[0];

if(!file){alert("Select file");return;}

let url=URL.createObjectURL(file);

books.push({title:title,url:url});

saveBooks();
displayBooks();

}

function readBook(index){

document.getElementById("reader").style.display="block";
document.getElementById("bookFrame").src=books[index].url;

}

function downloadMsg(){
alert("To download this book contact: bookscorner67@gmail.com");
}

function login(){

let pass=document.getElementById("password").value;

if(pass==="admin123"){
document.getElementById("adminPanel").style.display="block";
}else{
alert("Wrong password");
}

}

displayBooks();

</script>

</body>
</html>
